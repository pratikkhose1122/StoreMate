# ============================================================
# StoreMate SaaS — Docker Compose
# Services: NestJS API + PostgreSQL (no Redis for Phase 1)
# ============================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: storemate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: storemate
      POSTGRES_PASSWORD: storemate_dev_2024
      POSTGRES_DB: storemate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storemate -d storemate_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── NestJS API ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storemate-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: storemate
      DB_PASSWORD: storemate_dev_2024
      DB_DATABASE: storemate_db
      DB_SYNC: "false"
      JWT_SECRET: storemate_dev_jwt_secret_change_in_production
      JWT_EXPIRATION: 24h
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-your_firebase_project_id}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
