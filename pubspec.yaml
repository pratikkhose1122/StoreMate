name: storemate
description: "StoreMate - Smart Inventory & Billing for Indian Retailers"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI Components
  pinput: ^5.0.1
  google_fonts: ^6.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  mobile_scanner: ^7.2.0
  file_picker: ^11.0.2
  image_picker: ^1.2.2
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  fl_chart: ^1.2.0
  qr_flutter: ^4.1.0
  timeago: ^3.7.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
